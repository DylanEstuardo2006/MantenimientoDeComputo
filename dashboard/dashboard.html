<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mantenimiento de Equipos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="assets/css/dashboard.css">
    <link rel="stylesheet" href="assets/css/components/tables.css">
</head>

<body class="d-flex flex-column min-vh-100">

    <header class="admin-header py-3">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <!-- Botón hamburguesa (solo móvil) -->
            <button class="btn btn-outline-primary d-lg-none me-2" id="btnMenu">
                <i class="bi bi-list"></i>
            </button>

            <!-- Título -->
            <h5 class="mb-0 fw-bold text-primary me-auto">Panel Administrativo</h5>

            <!-- Lado derecho -->
            <div class="admin-user d-flex align-items-center gap-2">
                <div class="user-info text-end d-none d-sm-block">
                    <div class="fw-semibold" id="nombre-usuario-header">Cargando...</div>
                    <small class="text-muted" id="rol-usuario-header">Rol</small>
                </div>
                <div class="divider d-none d-sm-block"></div>
                <button class="btn btn-outline-primary btn-sm" id="btn-logout">
                    <span class="d-none d-sm-inline">Cerrar sesión</span>
                    <i class="bi bi-box-arrow-right d-sm-none"></i>
                </button>
            </div>
        </div>
    </header>
    <div class="container-fluid flex-fill">
        <div class="row">

            <!-- SIDEBAR -->
            <aside class="col-md-3 col-lg-2 admin-sidebar p-3" id="sidebar">
                <h6 class="sidebar-title">MENÚ</h6>
                <ul class="nav flex-column gap-2">
                    <a class="nav-link" href="#" id="btn-menu-usuarios" onclick="cargarVista('views/usuarios.html')">
                        <i class="bi bi-people-fill me-2"></i> Usuarios
                    </a>

                    <a class="nav-link" href="#" id="btn-menu-marcas" onclick="cargarVista('views/marcas.html')">
                        <i class="bi bi-tag-fill me-2"></i> Marcas
                    </a>
                    <a class="nav-link" href="#" id="btn-menu-modelos" onclick="cargarVista('views/modelos.html')">
                        <i class="bi bi-wallet-fill me-2"></i> Modelos
                    </a>
                    <a class="nav-link" href="#" id="btn-menu-equipos" onclick="cargarVista('views/equipos.html')">
                        <i class="bi bi-pc-display me-2"></i> Equipos
                    </a>
                    <a class="nav-link" href="#" id="btn-menu-ordenes">
                        <i class="bi bi-clipboard-data me-2"></i> Órdenes de Trabajo
                    </a>
                </ul>
            </aside>


            <!-- CONTENIDO -->
            <main id="contenido-principal" class="col-md-9 col-lg-10 p-4">

            </main>

        </div>
    </div>
    <!-- OVERLAY -->
    <div id="overlay"></div>

    <footer class="admin-footer text-center py-2 mt-auto">
        <small>
            Sistema de Mantenimiento | Panel Administrativo © 2026
        </small>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="dashboard.js"></script>
    <script src="assets/js/usuarios.js"></script>
    <script src="assets/js/marcas.js"></script>
    <script src="assets/js/modelos.js"></script>
</body>
