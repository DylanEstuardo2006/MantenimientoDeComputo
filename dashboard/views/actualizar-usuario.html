<div class="card shadow border-0 overflow-hidden">
    <div class="card-header bg-black text-white py-3">
        <h5 class="mb-0 fw-bold"><i class="bi bi-pencil-square me-2"></i> Gestión de Usuario: <span class="text-muted fw-light">Actualizar Datos</span></h5>
    </div>

    <div class="card-body p-4">
        <form id="formActualizarUsuario">
            <div class="row g-3"> <div class="col-12 border-bottom mb-2">
                    <p class="text-primary small fw-bold mb-1 text-uppercase">Información Personal</p>
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label small text-muted">Nombre</label>
                    <input type="text" class="form-control bg-light" id="nombre" placeholder="Nombre" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label small text-muted">Apellido Paterno</label>
                    <input type="text" class="form-control bg-light" id="apellidoPaterno" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label small text-muted">Apellido Materno</label>
                    <input type="text" class="form-control bg-light" id="apellidoMaterno" required>
                </div>

                <div class="col-12 border-bottom mt-4 mb-2">
                    <p class="text-primary small fw-bold mb-1 text-uppercase">Datos de la Cuenta</p>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label small text-muted">Matrícula (No editable)</label>
                    <input type="text" class="form-control-plaintext border-bottom ps-2" id="matricula" readonly>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label small text-muted">Teléfono de Contacto</label>
                    <input type="text" class="form-control" id="telefono" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label small text-muted">Rol de Usuario</label>
                    <select class="form-select border-primary" id="rol" required>
                        </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label small text-muted">Cambiar Contraseña (Opcional)</label>
                    <input type="password" class="form-control" id="password" placeholder="Dejar en blanco para no cambiar">
                </div>
            </div>

            <hr class="my-4">

            <div class="d-flex justify-content-end gap-2">
                <button type="button" class="btn btn-outline-secondary px-4" onclick="cargarVista('views/usuarios.html')">
                    Cancelar
                </button>
                <button type="submit" class="btn btn-warning px-4 fw-bold">
                    Guardar Cambios
                </button>
            </div>
        </form>
    </div>
</div>
