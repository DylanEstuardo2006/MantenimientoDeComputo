<div class="container mt-4">
    <div class="card border-0 shadow-sm">
        <div class="card-header bg-primary text-white d-flex justify-content-between py-3" style="background-color: #1a2a3a !important;">
            <span><i class="bi bi-pencil-square me-2"></i>Editor de Modelo</span>
            <span class="badge bg-light text-dark">ID: <span id="displayIdModelo">--</span></span>
        </div>
        
        <div class="card-body bg-white p-4">
            <form id="form-actualizar-modelo">
                <div class="row">
                    <div class="col-md-8 mb-3">
                        <label class="form-label fw-bold text-secondary">Modificar Nombre</label>
                        <input type="text" id="editNombreModelo" class="form-control form-control-lg border-2">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold text-secondary">Cambiar Marca</label>
                        <select id="selectMarca" class="form-select form-select-lg border-2">
                        </select>
                    </div>
                </div>

                <div class="mt-4 pt-3 border-top d-flex flex-column-reverse flex-sm-row justify-content-between gap-2">
                    <button type="button" class="btn btn-outline-secondary px-4" onclick="cargarVista('views/modelos.html')">
                        <i class="bi bi-arrow-left"></i> Volver al listado
                    </button>
                    <button type="submit" class="btn btn-dark px-5 fw-bold shadow-sm" style="background-color: #2c3e50; border: none;">
                        Guardar Cambios
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>renderizarSelectMarcas('selectMarca');</script>
