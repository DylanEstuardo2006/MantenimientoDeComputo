<div class="container mt-4">
    <h2>Crear Orden de Trabajo</h2>

    <!-- Seleccionar laboratorio -->
    <div class="mb-3">
        <label class="form-label">Laboratorio</label>
        <select id="laboratorioSelect" class="form-select">
            <option value="">Seleccione un laboratorio</option>
        </select>
    </div>

    <!-- Lista de dispositivos -->
    <div class="mb-3">
        <label class="form-label">Dispositivos</label>
        <div id="listaDispositivos" class="border p-3 rounded" style="max-height: 200px; overflow-y: auto;">
            <!-- Se llena dinámicamente -->
        </div>
    </div>

    <!-- Tipo de mantenimiento -->
    <div class="mb-3">
        <label class="form-label">Tipo de mantenimiento</label>
        <select id="tipoMantenimiento" class="form-select">
            <option value="">Seleccione tipo</option>
            <option value="1">Preventivo</option>
            <option value="2">Correctivo</option>
        </select>
    </div>

    <!-- Botón -->
    <button id="btnCrearOrden" class="btn btn-primary">
        Crear Orden
    </button>
</div>
