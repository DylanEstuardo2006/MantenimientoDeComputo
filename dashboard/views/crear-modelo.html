<div class="container-fluid py-4">
    <div class="card shadow-sm border-0">
        <div class="card-header bg-black text-white py-3">
            <h5 class="mb-0"><i class="bi bi-plus-lg me-2"></i>Registrar Nuevo Modelo</h5>
        </div>
        <div class="card-body p-4">
            <form id="form-crear-modelo">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Nombre del Modelo</label>
                        <input type="text" id="nombreModelo" class="form-control" placeholder="Ej: Galaxy S24 Ultra" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Marca</label>
                        <select id="selectMarca" class="form-select" required>
                            <option value="" selected disabled>Seleccione la marca correspondiente...</option>
                            </select>
                    </div>
                </div>
                <hr class="my-4">
                <div class="d-flex justify-content-end gap-2">
                    <button type="button" class="btn btn-light border" onclick="cargarVista('views/modelos.html')">Cancelar</button>
                    <button type="submit" class="btn btn-primary px-4">Guardar Nuevo Modelo</button>
                </div>
            </form>
        </div>
    </div>
</div>
