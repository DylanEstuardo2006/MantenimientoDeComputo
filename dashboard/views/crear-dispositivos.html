<div class="container-fluid px-3 py-4">
    <div class="card shadow border-0 mx-auto" style="max-width: 1100px;">
        <div class="card-header py-3 text-white" style="background-color: #0d1b2a;">
            <h4 class="mb-0 fw-bold"><i class="bi bi-plus-circle me-2"></i> Registro de Dispositivo</h4>
        </div>

        <div class="card-body p-4">
            <form id="formCrearDispositivo">
                <div class="row g-3">
                    <div class="col-md-8">
                        <label class="form-label fw-bold small text-muted text-uppercase">Nombre del Dispositivo</label>
                        <input type="text" id="editarNombreDispositivo" class="form-control"
                            placeholder="Ej: Laptop Dell Latitude">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold small text-muted text-uppercase">No. Inventario</label>
                        <input type="text" id="editarNumeroInventario" class="form-control" placeholder="11 dígitos">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-bold small text-muted text-uppercase">Tipo</label>
                        <select id="selectTipoDispositivo" class="form-select"></select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold small text-muted text-uppercase">Modelo</label>
                        <select id="selectModelos" class="form-select"></select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold small text-muted text-uppercase">Laboratorio</label>
                        <select id="selectLaboratorios" class="form-select"></select>
                    </div>
                </div>

                <div class="mt-5 pt-3 border-top d-flex flex-column flex-md-row justify-content-end gap-2">
                    <button type="button" class="btn btn-outline-secondary px-4 order-2 order-md-1"
                        onclick="cargarVista('views/dispositivos.html')">
                        Cancelar
                    </button>
                    <button type="submit" id="btnGuardarDispositivo" class="btn btn-primary px-4 order-1 order-md-2">
                        <i class="bi bi-save me-2"></i>Guardar Dispositivo
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
