<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/pages/login.css">
</head>

<body class="page-login d-flex flex-column min-vh-100">  
  <!---Agrega toda la altura de la pantalla y centrar contenido-->
  <header class="app-header">
    <div class="container py-3">
      <nav class="navbar navbar-expand-lg navbar-dark p-0">

        <!-- Logo -->
        <a class="navbar-brand fw-bold fs-4" href="index.html">
          Sistema<span class="text-primary">Mantenimiento</span>
        </a>

        <!-- Botón hamburguesa -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarPublic"
          aria-controls="navbarPublic" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Contenido colapsable -->
        <div class="collapse navbar-collapse" id="navbarPublic">

          <!-- Navegación -->
          <ul class="navbar-nav ms-auto me-3 mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active-link" href="index.html">Inicio</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="servicios.html">Servicios</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="contactos.html">Contacto</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="noticias.html">Noticias</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active-link" href="mapaDeSitio.html">Mapa de Sitio</a>
            </li>
          </ul>

          <!-- Acciones -->
          <div class="d-flex">
            <a href="login.html" class="btn btn-warning btn-login-header me-2">
              Iniciar sesión
            </a>

            <a href="#" class="btn btn-danger btn-logout-header d-none">
              Cerrar sesión
            </a>
          </div>

        </div>
      </nav>
    </div>
  </header>
  <main class="flex-fill d-flex align-items-center justify-content-center login-bg">

    <div class="container">
      <div class="row shadow-lg rounded-4 overflow-hidden login-wrapper">

        <!-- Imagen lado izquierdo -->
        <div class="col-lg-6 d-none d-lg-block p-0">
          <div class="login-image"><img src="img/logoEmpresa.png" alt="Logo de Empresa"></div>
        </div>

        <!-- Formulario lado derecho -->
        <div class="col-lg-6 bg-white p-5 d-flex align-items-center">
          <div class="w-100">

            <div class="text-center mb-4">
              <i class="bi bi-person-circle text-primary mb-1" style="font-size: 45px;"></i>
              <h4 class="fw-bold">Bienvenido al Sistema</h4>
              <p class="text-muted small">
                Ingresa tus credenciales para continuar
              </p>
            </div>

            <form>
              <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input type="text" id="matricula" placeholder="Tu matrícula" class="form-control" required>
              </div>
              <div class="mb-3">
                <label class="form-label small fw-semibold">Contraseña</label>
                <div class="input-group">

                  <input type="password" class="form-control" id="password" placeholder="••••••••" required>

                  <button class="btn btn-outline-secondary" type="button" id="btnTogglePassword">
                    <i class="bi bi-eye" id="iconoOjito"></i>
                  </button>
                </div>
              </div>
              <button onclick="ejecutarLogin(event)" id="btn-entrar" class="btn btn-primary w-100 fw-bold">
                Ingresar
              </button>
            </form>
          </div>
        </div>

      </div>
    </div>
  </main>
  <footer class="bg-dark text-white text-center py-3 mt-auto">
    <div class="container">
      <small>© 2026 Sistema de Mantenimiento - Todos los derechos reservados</small>
    </div>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script src="js/login.js"></script>
  <script src="js/utils.js"></script>
</body>

</html>
